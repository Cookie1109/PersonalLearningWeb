<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" fill="none">
  <defs>
    <linearGradient id="nexlWordDarkGrad" x1="24" y1="116" x2="500" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ccfff"/>
      <stop offset="1" stop-color="#d6ebff"/>
    </linearGradient>
    <filter id="nexlWordGlow" x="-20" y="-20" width="560" height="170" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.6  0 0 0 0 0.82  0 0 0 0 1  0 0 0 0.4 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <g filter="url(#nexlWordGlow)">
    <text x="22" y="98" fill="url(#nexlWordDarkGrad)" font-family="Segoe UI, Arial, sans-serif" font-size="98" font-weight="700" letter-spacing="8">NEXL</text>
  </g>
</svg>
